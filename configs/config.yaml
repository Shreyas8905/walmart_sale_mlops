project:
  name: walmart-sales-mlops
  version: "1.0.0"
  target: Weekly_Sales
  random_seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_splits: data/splits
  models: models
  reports: reports/explainability

mlflow:
  tracking_uri: mlruns
  experiment_name: walmart-weekly-sales

data:
  test_size: 0.15
  val_size: 0.15
  date_column: Date
  date_format: "%d-%m-%Y"
  categorical_features:
    - Store
    - Holiday_Flag
  numerical_features:
    - Temperature
    - Fuel_Price
    - CPI
    - Unemployment
    - Week
    - Month
    - Year
    - DayOfYear

models:
  ridge:
    alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
  lasso:
    alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
  elastic_net:
    alpha: [0.01, 0.1, 1.0]
    l1_ratio: [0.2, 0.5, 0.8]
  random_forest:
    n_estimators: [100, 200]
    max_depth: [None, 10, 20]
    min_samples_split: [2, 5]
  gradient_boosting:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    max_depth: [3, 5]
  xgboost:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    max_depth: [3, 6]
    reg_alpha: [0.0, 0.1]
    reg_lambda: [1.0, 10.0]

champion_selection:
  metric: rmse
  direction: minimize
